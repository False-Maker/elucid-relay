services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: elucid_relay
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d elucid_relay"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway-api:
    build:
      context: .
      dockerfile: services/gateway-api/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    environment:
      APP_ENV: development
      PORT: "8080"
      DATABASE_URL: postgres://relay:relay@postgres:5432/elucid_relay?sslmode=disable
      REDIS_ADDR: redis:6379
      MIGRATE_ON_START: "true"
      RATE_LIMIT_ENABLED: "true"
      COOKIE_SECURE: "false"
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:${PORTAL_PORT:-18081},http://127.0.0.1:${PORTAL_PORT:-18081}
      VAULT_KEY: local-development-vault-key-32!!
      OAUTH_WRAPPER_BEARER_TOKEN: ${OAUTH_WRAPPER_BEARER_TOKEN:-local-oauth-wrapper-token}
    ports:
      - "127.0.0.1:${GATEWAY_API_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz | grep -qx ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  oauth-wrapper:
    build:
      context: .
      dockerfile: apps/oauth-wrapper/Dockerfile
    environment:
      GATEWAY_BASE_URL: http://gateway-api:8080
      OAUTH_WRAPPER_BEARER_TOKEN: ${OAUTH_WRAPPER_BEARER_TOKEN:-local-oauth-wrapper-token}
      OAUTH_WRAPPER_LEASE_OWNER: local-oauth-wrapper
      OAUTH_WRAPPER_SUPPORTED_MODES: oauth,openai_cli,codex_cli,claude_cli,google_pkce,github_device,mock
    depends_on:
      gateway-api:
        condition: service_healthy
    profiles:
      - oauth-wrapper

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18080}
        VITE_RELAY_API_BASE_URL: ${VITE_RELAY_API_BASE_URL:-/relay}
    environment:
      RELAY_PROXY_URL: ${RELAY_PROXY_URL:-http://gateway-api:8080}
      NGINX_ENVSUBST_FILTER: "^RELAY_PROXY_URL$"
    ports:
      - "127.0.0.1:${PORTAL_PORT:-18081}:80"
    depends_on:
      gateway-api:
        condition: service_healthy

  mock-upstream:
    image: node:22-alpine
    working_dir: /app
    command: ["node", "mock-upstream.mjs"]
    volumes:
      - ./infra/mock-upstream.mjs:/app/mock-upstream.mjs:ro
    expose:
      - "8090"
    profiles:
      - smoke

volumes:
  postgres_data:
