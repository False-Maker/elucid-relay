services:
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-elucid_relay}
      POSTGRES_USER: ${POSTGRES_USER:-relay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    restart: unless-stopped

  redis:
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  gateway-api:
    environment:
      APP_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-relay}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-elucid_relay}?sslmode=disable
      REDIS_ADDR: redis:6379
      MIGRATE_ON_START: ${MIGRATE_ON_START:-false}
      RATE_LIMIT_ENABLED: "true"
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}
      VAULT_KEY: ${VAULT_KEY:?VAULT_KEY is required}
      OAUTH_WRAPPER_BEARER_TOKEN: ${OAUTH_WRAPPER_BEARER_TOKEN:?OAUTH_WRAPPER_BEARER_TOKEN is required}
      PORTAL_BASE_URL: ${PORTAL_BASE_URL:?PORTAL_BASE_URL is required}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-${PORTAL_BASE_URL}}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM is required}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-starttls}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_API_BASE_URL: ${STRIPE_API_BASE_URL:-https://api.stripe.com}
      BILLING_SUCCESS_URL: ${BILLING_SUCCESS_URL:-}
      BILLING_CANCEL_URL: ${BILLING_CANCEL_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz | grep -q '\"status\":\"ok\"'"]

  portal:
    build:
      args:
        VITE_API_BASE_URL: ${PUBLIC_GATEWAY_API_URL:-${PORTAL_BASE_URL}}
    restart: unless-stopped

volumes:
  redis_data:
